server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    # Default body cap for static / SPA routes — generous enough but
    # smaller than the API cap below, so a misrouted huge upload fails
    # with a clear error instead of silently consuming nginx workers.
    client_max_body_size 100m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Knowledge-doc uploads can be large product manuals (often
        # 100-400MB). Override the server-level cap for /api/ only.
        # Bump this if a single PDF ever exceeds 800MB.
        client_max_body_size 800m;
        client_body_buffer_size 1m;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;

        # SSE / 长流式响应必备:关闭 nginx 缓冲,数据立刻下发到浏览器
        proxy_buffering off;
        proxy_cache off;
        # 关闭按字节分块缓冲,禁用响应数据 gzip(SSE 不能 gzip)
        gzip off;
        chunked_transfer_encoding on;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
