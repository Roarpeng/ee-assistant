services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8090:80"
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "*"
      http_proxy: ""
      https_proxy: ""
      no_proxy: "*"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ele:ele@postgres:5432/ele
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "*"
      http_proxy: ""
      https_proxy: ""
      no_proxy: "*"
    depends_on:
      - postgres
      - qdrant
      - minio

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ele
      POSTGRES_PASSWORD: ele
      POSTGRES_DB: ele
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
